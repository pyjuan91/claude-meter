name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci

      - name: Package extension
        run: cd src && zip -r ../claude-meter.zip manifest.json *.js *.css *.html icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-meter.zip
          generate_release_notes: true
