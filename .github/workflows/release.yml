name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci

      - name: Package extension
        run: zip -r claude-usage-monitor.zip manifest.json utils.js content.js popup.js background.js browser-polyfill.js styles.css popup.html icons/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-usage-monitor.zip
          generate_release_notes: true
